<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис — Компактный сенсорный</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
        }

        /* контейнер под экран смартфона */
        .game-container {
            max-width: 440px;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 48px;
            padding: 14px 12px 18px 12px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(2px);
        }

        /* главная панель */
        .main-panel {
            background: #101624;
            border-radius: 32px;
            padding: 14px 12px;
            box-shadow: inset 0 2px 3px #00000030, 0 8px 18px rgba(0,0,0,0.3);
        }

        /* Верхняя панель: очки и следующая фигура в одну строку */
        .top-stats {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #0b0f1a;
            border-radius: 28px;
            padding: 8px 18px;
            margin-bottom: 18px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.03), 0 4px 10px rgba(0,0,0,0.3);
        }

        .score-compact {
            flex: 2;
            text-align: left;
        }

        .score-compact span.label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: #8f9bb5;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .score-value-compact {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f3ff, #b9cdff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .next-compact {
            flex: 1.2;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .next-compact span.label {
            font-size: 0.7rem;
            color: #8f9bb5;
            text-transform: uppercase;
            font-weight: 600;
        }

        #nextCanvas {
            background-color: #0a0d16;
            border-radius: 18px;
            width: 70px;
            height: 70px;
            display: block;
            box-shadow: inset 0 0 0 1px #282e40, 0 3px 6px black;
        }

        /* игровое поле — чуть уменьшено по высоте */
        .game-play-area {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        canvas#boardCanvas {
            display: block;
            border-radius: 24px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.5);
            background-color: #0b0e18;
            width: 100%;
            height: auto;
            image-rendering: crisp-edges;
        }

        /* контролы */
        .controls {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row-buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .ctrl-btn {
            background: #1f2538;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            color: #dee5ff;
            padding: 10px 0;
            border-radius: 60px;
            box-shadow: 0 5px 0 #05070c;
            transition: all 0.05s linear;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            backdrop-filter: blur(4px);
            background: rgba(30, 38, 58, 0.95);
            min-height: 56px;
        }

        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #05070c;
        }

        .restart-btn {
            background: #c2412c;
            color: white;
            font-size: 1.1rem;
            padding: 10px;
            flex: 0.7;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .game-status {
            text-align: center;
            margin-top: 14px;
            font-size: 0.8rem;
            font-weight: bold;
            background: #00000066;
            border-radius: 50px;
            padding: 5px 10px;
            color: #ffda88;
        }

        @media (max-width: 480px) {
            .ctrl-btn {
                font-size: 1.6rem;
                padding: 8px 0;
                min-height: 50px;
            }
            .score-value-compact {
                font-size: 1.7rem;
            }
            .next-compact span.label {
                font-size: 0.6rem;
            }
            #nextCanvas {
                width: 60px;
                height: 60px;
            }
            .top-stats {
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="main-panel">
        <!-- Верхняя строка: очки + следующая фигура -->
        <div class="top-stats">
            <div class="score-compact">
                <span class="label">ОЧКИ</span>
                <div class="score-value-compact" id="scoreDisplay">0</div>
            </div>
            <div class="next-compact">
                <span class="label">NEXT</span>
                <canvas id="nextCanvas" width="120" height="120" style="width:70px; height:70px;"></canvas>
            </div>
        </div>

        <!-- игровое поле (уменьшена высота за счёт изменения размеров канваса) -->
        <div class="game-play-area">
            <canvas id="boardCanvas" width="300" height="540"></canvas>
        </div>

        <div class="controls">
            <div class="row-buttons">
                <button class="ctrl-btn" id="leftBtn">◀</button>
                <button class="ctrl-btn" id="rightBtn">▶</button>
                <button class="ctrl-btn" id="rotateBtn">↻</button>
            </div>
            <div class="row-buttons">
                <button class="ctrl-btn" id="downBtn">▼</button>
                <button class="ctrl-btn" id="dropBtn">⬇︎⬇︎</button>
                <button class="ctrl-btn restart-btn" id="restartBtn">🔄</button>
            </div>
        </div>
        <div class="game-status" id="gameStatus">🎮 ИГРА АКТИВНА</div>
    </div>
</div>

<script>
    (function() {
        // ---------- НОВЫЕ РАЗМЕРЫ: ширина 10 блоков, высота 18 блоков (540/30 = 18) ----------
        const COLS = 10;
        const ROWS = 18;        // уменьшили высоту с 20 до 18 блоков
        const BLOCK_SIZE = 30;   // canvas 300x540px
        
        // Элементы
        const boardCanvas = document.getElementById('boardCanvas');
        const ctx = boardCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const gameStatusDiv = document.getElementById('gameStatus');
        
        // Игровые переменные
        let board = [];           
        let activePiece = null;   
        let nextPiece = null;
        let score = 0;
        let gameLoopInterval = null;
        let isGameOver = false;
        
        // Фигуры (классика с цветами)
        const TETROMINOS = [
            {   // I
                shape: [[1,1,1,1]],
                color: '#2ad4e3' 
            },
            {   // O
                shape: [[1,1],[1,1]],
                color: '#f7d44a' 
            },
            {   // T
                shape: [[0,1,0],[1,1,1]],
                color: '#c572e8' 
            },
            {   // S
                shape: [[0,1,1],[1,1,0]],
                color: '#6fcf97' 
            },
            {   // Z
                shape: [[1,1,0],[0,1,1]],
                color: '#e66767' 
            },
            {   // L
                shape: [[1,0,0],[1,1,1]],
                color: '#f0a55a' 
            },
            {   // J
                shape: [[0,0,1],[1,1,1]],
                color: '#5d9bdb' 
            }
        ];
        
        function getRandomTetromino() {
            const idx = Math.floor(Math.random() * TETROMINOS.length);
            const original = TETROMINOS[idx];
            const shapeCopy = original.shape.map(row => [...row]);
            return {
                shape: shapeCopy,
                color: original.color,
            };
        }
        
        function initBoard() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        }
        
        // проверка коллизии
        function collision(shape, offX, offY) {
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[0].length; col++) {
                    if (shape[row][col] !== 0) {
                        const boardX = offX + col;
                        const boardY = offY + row;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) {
                            return true;
                        }
                        if (boardY >= 0 && board[boardY][boardX] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        // спавн новой фигуры
        function spawnNewPiece() {
            if (!nextPiece) {
                nextPiece = getRandomTetromino();
            }
            const newPiece = {
                shape: nextPiece.shape.map(row => [...row]),
                color: nextPiece.color,
                x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                y: 0
            };
            activePiece = newPiece;
            nextPiece = getRandomTetromino();
            
            if (collision(activePiece.shape, activePiece.x, activePiece.y)) {
                isGameOver = true;
                if (gameLoopInterval) clearInterval(gameLoopInterval);
                gameLoopInterval = null;
                gameStatusDiv.innerText = '💀 ИГРА ОКОНЧЕНА. НАЖМИТЕ 🔄 💀';
                drawBoard();
                return false;
            }
            drawBoard();
            return true;
        }
        
        // зафиксировать фигуру
        function mergePiece() {
            if (!activePiece) return false;
            // Запись на доску
            for (let row = 0; row < activePiece.shape.length; row++) {
                for (let col = 0; col < activePiece.shape[0].length; col++) {
                    if (activePiece.shape[row][col] !== 0) {
                        const boardX = activePiece.x + col;
                        const boardY = activePiece.y + row;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = activePiece.color;
                        }
                    }
                }
            }
            
            // очистка линий
            let linesCleared = 0;
            for (let row = ROWS-1; row >= 0; ) {
                let full = true;
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] === 0) {
                        full = false;
                        break;
                    }
                }
                if (full) {
                    for (let r = row; r > 0; r--) {
                        board[r] = [...board[r-1]];
                    }
                    board[0] = Array(COLS).fill(0);
                    linesCleared++;
                } else {
                    row--;
                }
            }
            
            if (linesCleared > 0) {
                const points = [0, 100, 300, 600, 1000];
                const addPoints = points[Math.min(linesCleared,4)];
                score += addPoints;
                updateScoreUI();
            }
            
            const success = spawnNewPiece();
            drawBoard();
            if (isGameOver) return false;
            return success;
        }
        
        function movePiece(dx, dy) {
            if (!activePiece || isGameOver) return false;
            const newX = activePiece.x + dx;
            const newY = activePiece.y + dy;
            if (!collision(activePiece.shape, newX, newY)) {
                activePiece.x = newX;
                activePiece.y = newY;
                drawBoard();
                return true;
            } else if (dy === 1) {
                mergePiece();
                drawBoard();
                return false;
            }
            return false;
        }
        
        function rotatePiece() {
            if (!activePiece || isGameOver) return;
            const oldShape = activePiece.shape;
            const rotated = oldShape[0].map((_, idx) => oldShape.map(row => row[idx]).reverse());
            if (!collision(rotated, activePiece.x, activePiece.y)) {
                activePiece.shape = rotated;
            } else {
                for (let offset of [-1, 1, -2, 2]) {
                    if (!collision(rotated, activePiece.x + offset, activePiece.y)) {
                        activePiece.shape = rotated;
                        activePiece.x += offset;
                        break;
                    }
                }
            }
            drawBoard();
        }
        
        function hardDrop() {
            if (!activePiece || isGameOver) return;
            while (!collision(activePiece.shape, activePiece.x, activePiece.y + 1)) {
                activePiece.y++;
            }
            mergePiece();
            drawBoard();
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        
        function drawBoard() {
            ctx.clearRect(0, 0, 300, 540);
            // Отрисовка сетки и блоков доски
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const color = board[row][col];
                    if (color !== 0) {
                        ctx.fillStyle = color;
                        ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        ctx.fillStyle = 'rgba(255,255,240,0.2)';
                        ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-2, 2);
                    } else {
                        ctx.fillStyle = '#10131f';
                        ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        ctx.strokeStyle = '#202536';
                        ctx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.8, BLOCK_SIZE-0.8);
                    }
                }
            }
            
            // активная фигура
            if (activePiece && !isGameOver) {
                const shape = activePiece.shape;
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[0].length; col++) {
                        if (shape[row][col]) {
                            const x = (activePiece.x + col) * BLOCK_SIZE;
                            const y = (activePiece.y + row) * BLOCK_SIZE;
                            ctx.fillStyle = activePiece.color;
                            ctx.fillRect(x, y, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                            ctx.fillStyle = 'rgba(255,250,210,0.35)';
                            ctx.fillRect(x+2, y+2, BLOCK_SIZE-8, 3);
                        }
                    }
                }
            }
            
            if (isGameOver) {
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#0a0c16';
                ctx.fillRect(0, 0, 300, 540);
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ffddbb';
                ctx.font = 'bold 18px "Segoe UI"';
                ctx.shadowBlur = 0;
                ctx.fillText('GAME OVER', 72, 250);
                ctx.font = '10px monospace';
                ctx.fillStyle = '#bbaa88';
                ctx.fillText('нажмите 🔄', 112, 310);
            }
            
            drawNext();
        }
        
        function drawNext() {
            nextCtx.clearRect(0, 0, 120, 120);
            nextCtx.fillStyle = '#0a0d16';
            nextCtx.fillRect(0, 0, 120, 120);
            if (nextPiece) {
                const shape = nextPiece.shape;
                const color = nextPiece.color;
                // адаптивный размер блока внутри превью
                const blockSize = 24;
                const shapeCols = shape[0].length;
                const shapeRows = shape.length;
                const totalW = shapeCols * blockSize;
                const totalH = shapeRows * blockSize;
                const startX = (120 - totalW) / 2;
                const startY = (120 - totalH) / 2;
                for (let row = 0; row < shapeRows; row++) {
                    for (let col = 0; col < shapeCols; col++) {
                        if (shape[row][col]) {
                            nextCtx.fillStyle = color;
                            nextCtx.fillRect(startX + col * blockSize, startY + row * blockSize, blockSize-1, blockSize-1);
                            nextCtx.fillStyle = 'rgba(255,245,210,0.5)';
                            nextCtx.fillRect(startX + col * blockSize + 2, startY + row * blockSize + 2, blockSize-6, 4);
                        }
                    }
                }
            }
        }
        
        function gameTick() {
            if (!isGameOver && activePiece) {
                movePiece(0, 1);
                drawBoard();
            }
        }
        
        function restartGame() {
            if (gameLoopInterval) {
                clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }
            isGameOver = false;
            score = 0;
            updateScoreUI();
            initBoard();
            nextPiece = getRandomTetromino();
            const startPiece = getRandomTetromino();
            activePiece = {
                shape: startPiece.shape.map(row => [...row]),
                color: startPiece.color,
                x: Math.floor((COLS - startPiece.shape[0].length) / 2),
                y: 0
            };
            nextPiece = getRandomTetromino();
            if (collision(activePiece.shape, activePiece.x, activePiece.y)) {
                isGameOver = true;
                gameStatusDiv.innerText = '⚠️ РЕСТАРТ ОШИБКА, ПОВТОРИТЕ';
            } else {
                isGameOver = false;
                gameStatusDiv.innerText = '🎮 ИГРА АКТИВНА';
            }
            drawBoard();
            gameLoopInterval = setInterval(() => gameTick(), 390);
        }
        
        function attachControls() {
            const left = document.getElementById('leftBtn');
            const right = document.getElementById('rightBtn');
            const down = document.getElementById('downBtn');
            const rotate = document.getElementById('rotateBtn');
            const drop = document.getElementById('dropBtn');
            const restart = document.getElementById('restartBtn');
            
            const handler = (fn, allowOnGameOver = false) => (e) => {
                e.preventDefault();
                if (!isGameOver || allowOnGameOver) {
                    fn();
                    drawBoard();
                }
            };
            
            left.addEventListener('click', handler(() => movePiece(-1, 0)));
            right.addEventListener('click', handler(() => movePiece(1, 0)));
            down.addEventListener('click', handler(() => movePiece(0, 1)));
            rotate.addEventListener('click', handler(() => rotatePiece()));
            drop.addEventListener('click', handler(() => hardDrop()));
            restart.addEventListener('click', (e) => {
                e.preventDefault();
                restartGame();
            });
            
            const btns = [left, right, down, rotate, drop, restart];
            btns.forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    btn.click();
                });
            });
        }
        
        function startGame() {
            initBoard();
            nextPiece = getRandomTetromino();
            const firstPiece = getRandomTetromino();
            activePiece = {
                shape: firstPiece.shape.map(row => [...row]),
                color: firstPiece.color,
                x: Math.floor((COLS - firstPiece.shape[0].length) / 2),
                y: 0
            };
            nextPiece = getRandomTetromino();
            score = 0;
            updateScoreUI();
            isGameOver = false;
            gameStatusDiv.innerText = '🎮 ИГРА АКТИВНА';
            drawBoard();
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(() => gameTick(), 390);
        }
        
        attachControls();
        startGame();
    })();
</script>
</body>
</html>
