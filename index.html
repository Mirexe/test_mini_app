<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>НЕ ВХОДИТЬ</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #cccccc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .warning-box {
            text-align: center;
            border: 4px solid #333;
            padding: 50px;
            background-color: #222;
        }

        h1 {
            color: #ff4444;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #888;
        }

        /* Обычная, скучная кнопка */
        .btn {
            background-color: #444;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: #555;
        }

        /* Оверлей для гифки */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        img {
            max-width: 90%;
            max-height: 80%;
        }

        .close-text {
            margin-top: 20px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="warning-box">
        <h1>403: ДОСТУП ЗАПРЕЩЕН</h1>
        <p>Администрация не рекомендует нажимать на эту кнопку.</p>
        <button class="btn" onclick="openSecret()">Я всё равно нажму</button>
    </div>

    <div id="overlay" onclick="closeSecret()">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y1ZnR3Ym5qZ3R4eG54eG54eG54eG54eG54eG54eG54eG54JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/Ju7l5y9osyymQ/giphy.gif" alt="Rickroll">
        <div class="close-text">Ну, тебя же предупреждали. (Кликни, чтобы уйти)</div>
    </div>

    <script>
        function openSecret() {
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeSecret() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>

</body>
</html>
