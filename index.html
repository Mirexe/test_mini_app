<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Protocol 99</title>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Панель управления */
        .panel {
            background: #ecf0f1;
            padding: 50px;
            border-radius: 20px;
            border: 10px solid #bdc3c7;
            box-shadow: 20px 20px 0px #34495e;
            text-align: center;
            position: relative;
        }

        h2 {
            color: #c0392b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Та самая кнопка */
        .big-red-button {
            width: 150px;
            height: 150px;
            background-color: #e74c3c;
            border: none;
            border-radius: 50%;
            box-shadow: 0 10px 0 #c0392b, 0 15px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            outline: none;
        }

        .big-red-button:active {
            box-shadow: 0 2px 0 #c0392b, 0 5px 10px rgba(0,0,0,0.4);
            transform: translateY(8px);
        }

        .big-red-button::after {
            content: "НЕ ЖАТЬ";
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Экран с гифкой */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(231, 76, 60, 0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .gif-frame {
            border: 15px solid white;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 90%;
        }

        .status-msg {
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;
            background: black;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Emergency System</h2>
        <div style="margin: 20px 0;">
            <div style="width: 20px; height: 20px; background: #27ae60; border-radius: 50%; display: inline-block; animation: pulse 1s infinite;"></div>
            <span style="color: #7f8c8d; font-weight: bold;">SYSTEM READY</span>
        </div>
        <button class="big-red-button" onclick="activate()"></button>
    </div>

    <div id="overlay" onclick="deactivate()">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y1ZnR3Ym5qZ3R4eG54eG54eG54eG54eG54eG54eG54eG54JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/10YqNf7V0pM000/giphy.gif" class="gif-frame">
        <div class="status-msg">САМОЛИКВИДАЦИЯ ОТМЕНЕНА ПО ПРИЧИНЕ: НЕХУЙ</div>
        <p style="color: white;">(Кликни, чтобы вернуться назад)</p>
    </div>

    <script>
        function activate() {
            document.getElementById('overlay').style.display = 'flex';
            // Можно добавить звук сирены, если очень хочется
        }

        function deactivate() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>

    <style>
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</body>
</html>
